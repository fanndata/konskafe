<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кафе "Студент"</title>
    
    <style>
         @media screen and (max-width: 600px) {
            body {
                background-color: yellow; 
            }
        }

        body {
           
            padding: 20px;
        }

       
        header {
            background-color: #6f4e37;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none; 
        }

        
        section {
            background-color: white;
            padding: 20px;
            margin: 15px 0;
        }

        h2 {
            color: #6f4e37;
            margin-bottom: 10px;
        }

        .menu-container {
            display: flex;
            gap: 20px;
        }

        .menu-item {
            background-color: #fff8f5;
            padding: 15px;
            flex: 1; 
            border-left: 4px solid #6f4e37;
        }

        
        .promo-block {
            background-color: #ffe6e6;
            padding: 15px;
        }

       
        button {
            background-color: #6f4e37;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
            font-size: 16px;
        }

        /* Подвал */
        footer {
            text-align: center;
            padding: 15px;
            color: #777;
        }

      
    </style>
</head>
<body>

    <header>
        <h1>Кафе "Студент"</h1>
        <nav>
            <a href="#menu">Меню</a>
            <a href="#contacts">Контакты</a>
        </nav>
    </header>

    <main>
        <section id="menu">
            <h2>Меню</h2>
            <div class="menu-container">
                <div class="menu-item">
                    <h3>Капучино</h3>
                    <p>Цена: 130₽</p>
                </div>
                <div class="menu-item">
                    <h3>Сэндвич</h3>
                    <p>Цена: 150₽</p>
                </div>
            </div>
        </section>

        <section>
            <h2>Акции</h2>
            <article class="promo-block">
                <strong>Студенческий час!</strong>
                <p>Скидка 15% с 12:00 до 14:00 по студенческому билету.</p>
            </article>
        </section>

        <section id="contacts">
            <h2>Контакты</h2>
            <p>📍 Адрес: ул. Университетская, 5</p>
            <p>🕒 Работаем: Пн-Пт с 08:00 до 19:00</p>
            <button id="check-button">Проверить: открыты ли мы сейчас?</button>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Кафе "Студент"</p>
    </footer>

    <script>
        
        const myButton = document.getElementById('check-button');

        
        myButton.addEventListener('click', function() {
           
            const currentHour = new Date().getHours();
            const currentDay = new Date().getDay(); 

           
            if (currentDay >= 1 && currentDay <= 5 && currentHour >= 8 && currentHour < 19) {
                alert('Мы открыты! Заходите за кофе! ☕');
            } else {
                alert('Сейчас мы закрыты. Ждем вас в рабочее время! 😴');
            }
        });
    </script>

</body>
</html>
